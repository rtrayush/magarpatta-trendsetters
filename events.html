<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Events — Rotaract Club of Magarpatta Trendsetters</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Public+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div data-include="partials/header.html"></div>

<main>
  <section class="page-hero container">
    <span class="ribbon-eyebrow">Events</span>
    <h1>Where the service actually happens.</h1>
    <p>From district summits to Friday-afternoon donation drives — here's what we've been up to, and what's coming next.</p>
  </section>

  <section class="container" style="padding-top:0;">
    <div class="section-head" style="margin-bottom:24px;">
      <span class="ribbon-eyebrow">What's Next</span>
      <h2 class="mt-0">Upcoming Events</h2>
    </div>
    <div id="upcomingGrid" class="card-grid grid-3">
      <div class="empty-state">Loading upcoming events&hellip;</div>
    </div>
  </section>

  <section class="alt">
    <div class="container">
      <div class="section-head" style="margin-bottom:18px;">
        <span class="ribbon-eyebrow">The Archive</span>
        <h2 class="mt-0">Past Events</h2>
      </div>
      <div id="eventFilterChips" class="filter-bar"></div>
      <div id="pastGrid" class="card-grid grid-3">
        <div class="empty-state">Loading past events&hellip;</div>
      </div>
    </div>
  </section>
</main>

<div data-include="partials/footer.html"></div>

<script src="js/include.js"></script>
<script src="js/main.js"></script>
<script src="js/events.js"></script>
</body>
</html>
